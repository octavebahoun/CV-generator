<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV & Portfolio Generator</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap"
    rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0ede8;
      --muted: #888;
      --accent: #e8d5a3;
      --accent2: #c4a882;
      --font-display: 'Fraunces', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --radius: 12px;
      --shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .theme-minimal {
      --bg: #fafaf8;
      --surface: #ffffff;
      --surface2: #f4f4f2;
      --border: #e8e8e4;
      --text: #1a1a18;
      --muted: #888880;
      --accent: #1a1a18;
      --accent2: #555550;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .theme-creative {
      --bg: #0d0a1e;
      --surface: #150f2e;
      --surface2: #1e1640;
      --border: #2d2555;
      --text: #f5f0ff;
      --muted: #9988cc;
      --accent: #c084fc;
      --accent2: #818cf8;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 8px 40px rgba(192, 132, 252, 0.15);
    }

    .theme-classic {
      --bg: #f5f0e8;
      --surface: #fffef9;
      --surface2: #f0ece0;
      --border: #ddd8cc;
      --text: #2c2416;
      --muted: #8a7d6a;
      --accent: #8b4513;
      --accent2: #a0522d;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--muted);
      font-weight: 300;
      font-style: italic;
    }

    /* THEME SWITCHER */
    .theme-switcher {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }

    .theme-btn:hover {
      transform: scale(1.15);
    }

    .theme-btn.active {
      border-color: var(--accent);
    }

    .theme-btn[data-theme="dark"] {
      background: linear-gradient(135deg, #0f0f0f 50%, #e8d5a3 50%);
    }

    .theme-btn[data-theme="minimal"] {
      background: linear-gradient(135deg, #fafaf8 50%, #1a1a18 50%);
      border: 2px solid #ddd;
    }

    .theme-btn[data-theme="creative"] {
      background: linear-gradient(135deg, #0d0a1e 50%, #c084fc 50%);
    }

    .theme-btn[data-theme="classic"] {
      background: linear-gradient(135deg, #f5f0e8 50%, #8b4513 50%);
      border: 2px solid #ddd;
    }

    /* API KEY BAR */
    .api-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
    }

    .api-bar label {
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .api-bar input {
      flex: 1;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-bar input:focus {
      border-color: var(--accent);
    }

    .api-bar .model-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    /* LAYOUT */
    .app-layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: calc(100vh - 100px);
      align-items: start;
      overflow: visible;
    }

    .editor-col {
      display: flex;
      flex-direction: column;
      align-self: start;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    /* LEFT PANEL - EDITOR */
    .editor-panel {
      overflow: visible;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .editor-panel::-webkit-scrollbar {
      width: 4px;
    }

    .editor-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .editor-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* SECTION CARD */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 10px;
      transition: box-shadow 0.2s;
    }

    .section-card:hover {
      box-shadow: var(--shadow);
    }

    .section-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }

    .section-header:hover {
      background: var(--surface2);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-icon {
      font-size: 1rem;
    }

    .toggle-icon {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .section-card.open .toggle-icon {
      transform: rotate(180deg);
    }

    .section-body {
      display: none;
      padding: 18px;
      flex-direction: column;
      gap: 12px;
    }

    .section-card.open .section-body {
      display: flex;
    }

    /* FORM ELEMENTS */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-group input,
    .field-group textarea,
    .field-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: vertical;
    }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* SKILL TAGS */
    .skills-input-wrap {
      display: flex;
      gap: 6px;
    }

    .skills-input-wrap input {
      flex: 1;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px 3px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.7rem;
      transition: color 0.2s;
    }

    .tag-remove:hover {
      color: #ef4444;
    }

    /* DYNAMIC ITEMS */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .item-card .remove-item {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .item-card .remove-item:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    /* BUTTONS */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }

    .btn-accent:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-ai {
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      color: white;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 7px 14px;
    }

    .btn-ai:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(192, 132, 252, 0.3);
    }

    .btn-ai:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .section-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
    }

    /* GENERATE BAR */
    .generate-bar {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .generate-bar .btn-accent {
      flex: 1;
      justify-content: center;
      padding: 12px;
      font-size: 0.95rem;
    }

    /* RIGHT PANEL - PREVIEW */
    .preview-panel {
      min-width: 0;
      min-height: calc(100vh - 100px);
      overflow: visible;
      background: var(--bg);
      position: relative;
    }

    .preview-panel::-webkit-scrollbar {
      width: 6px;
    }

    .preview-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .preview-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .preview-toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .preview-toolbar .btn {
      font-size: 0.82rem;
      padding: 6px 14px;
    }

    .export-menu {
      position: relative;
    }

    .generate-bar .export-menu {
      flex: 1;
    }

    .generate-bar .export-menu .export-trigger {
      width: 100%;
      justify-content: center;
    }

    .export-menu-list {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 30;
    }

    .export-menu.open .export-menu-list {
      display: flex;
    }

    .export-option {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.84rem;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .export-option:hover {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--accent);
    }

    .export-trigger[disabled],
    .export-option[disabled] {
      opacity: 0.55;
      cursor: wait;
    }

    .export-stage {
      position: fixed;
      left: -10000px;
      top: 0;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .export-document {
      min-height: 100vh;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg);
    }

    .export-sheet {
      width: 794px;
      min-height: 1123px;
      padding: 56px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .export-sheet .cv-preview {
      max-width: none;
      margin: 0;
      padding: 0;
      animation: none;
    }

    .export-sheet .cv-layout-sidebar {
      grid-template-columns: 200px minmax(0, 1fr);
    }

    .export-sheet .preview-toolbar,
    .export-sheet .empty-state {
      display: none;
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .export-document {
        padding: 0;
        background: #fff;
      }

      .export-sheet {
        width: 210mm;
        min-height: 297mm;
        padding: 14mm;
      }
    }

    /* CV PREVIEW */
    .cv-preview {
      padding: 40px 48px;
      max-width: 800px;
      margin: 0 auto;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cv-header-section {
      margin-bottom: 36px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 28px;
    }

    .cv-name {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .cv-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--accent);
      font-style: italic;
      margin-bottom: 14px;
    }

    .cv-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.82rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .cv-contact span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .cv-inline-icon {
      width: 0.95rem;
      height: 0.95rem;
      display: inline-block;
      flex-shrink: 0;
      color: currentColor;
      vertical-align: middle;
    }

    .cv-inline-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cv-section {
      margin-bottom: 30px;
    }

    .cv-section-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cv-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .cv-about {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text);
      opacity: 0.88;
    }

    .cv-item {
      margin-bottom: 18px;
    }

    .cv-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 3px;
    }

    .cv-item-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .cv-item-org {
      color: var(--accent);
      font-size: 0.85rem;
    }

    .cv-item-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .cv-item-desc {
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0.8;
      line-height: 1.6;
      margin-top: 4px;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .skill-pill:hover {
      border-color: var(--accent);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .project-card-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .project-card-preview:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .project-card-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .project-card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .project-card-link {
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 8px;
      font-family: var(--font-mono);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: var(--text);
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 0.88rem;
    }

    /* LOADING */
    .ai-loading {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #c084fc;
      font-size: 0.8rem;
      font-family: var(--font-mono);
    }

    .dot-pulse span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #c084fc;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    .dot-pulse span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot-pulse span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* LAYOUT PICKER */
    .layout-picker {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .layout-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      font-family: var(--font-body);
    }

    .layout-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .layout-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }

    .layout-btn i {
      font-size: 1rem;
    }

    /* PHOTO in CV */
    .cv-photo {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      flex-shrink: 0;
    }

    /* Layout: classic — name left, photo right */
    .cv-header-classic {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .cv-header-classic .cv-header-text {
      flex: 1;
    }

    /* Layout: sidebar — photo left column */
    .cv-layout-sidebar {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 32px;
    }

    .cv-sidebar-col {
      border-right: 1px solid var(--border);
      padding-right: 28px;
    }

    .cv-sidebar-photo {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid var(--accent);
      margin-bottom: 18px;
    }

    .cv-sidebar-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cv-sidebar-title {
      color: var(--accent);
      font-style: italic;
      font-size: 0.88rem;
      margin-bottom: 14px;
    }

    .cv-sidebar-contact {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .cv-sidebar-contact span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cv-sidebar-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin: 18px 0 8px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: #22c55e;
    }

    .toast.error {
      border-color: #ef4444;
    }

    /* ── MOBILE TAB BAR ── */
    .mobile-tabs {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }

    .mobile-tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.85rem;
      padding: 12px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: color 0.2s, border-color 0.2s;
    }

    .mobile-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .mobile-tab i {
      font-size: 1.1rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      header {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 10px;
      }

      header>div:last-child {
        flex-wrap: wrap;
        gap: 10px;
      }

      .layout-picker span,
      .theme-switcher span {
        display: none;
      }

      .layout-btn {
        padding: 4px 8px;
        font-size: 0.75rem;
      }

      .layout-btn i {
        font-size: 0.9rem;
      }

      .api-bar {
        padding: 8px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .api-bar label {
        display: none;
      }

      .api-bar input {
        max-width: 100%;
        flex: 1;
        min-width: 0;
      }

      .mobile-tabs {
        display: flex;
      }

      .app-layout {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      #appWrapper {
        height: auto;
      }

      /* panels shown/hidden by JS tab switching */
      .editor-col {
        display: none;
        border-right: none;
      }

      .editor-col.tab-active {
        display: flex;
      }

      .preview-panel {
        display: none;
      }

      .preview-panel.tab-active {
        display: block;
      }

      /* when editor visible, make it scrollable full page */
      .editor-col.tab-active {
        flex-direction: column;
        min-height: calc(100vh - 160px);
      }

      .editor-panel {
        flex: 1;
        height: auto;
        max-height: none;
        overflow-y: visible;
        padding: 16px;
      }

      .generate-bar {
        padding: 12px 16px;
        position: sticky;
        bottom: 0;
        z-index: 20;
      }

      /* preview scrolls naturally */
      .preview-panel.tab-active {
        min-height: calc(100vh - 160px);
        overflow-y: auto;
      }

      .cv-preview {
        padding: 24px 20px;
      }

      .cv-name {
        font-size: 2rem;
      }

      .preview-toolbar {
        padding: 10px 16px;
      }

      /* sidebar layout stacks on mobile */
      .cv-layout-sidebar {
        grid-template-columns: 1fr;
      }

      .cv-sidebar-col {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-right: 0;
        padding-bottom: 20px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .cv-sidebar-contact {
        align-items: center;
      }

      /* projects grid becomes 1 col */
      .projects-grid {
        grid-template-columns: 1fr;
      }

      /* field rows stack */
      .field-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 1.1rem;
      }

      .layout-btn span-text {
        display: none;
      }

      .theme-btn {
        width: 22px;
        height: 22px;
      }

      .btn-ai {
        font-size: 0.78rem;
        padding: 6px 10px;
      }

      .cv-name {
        font-size: 1.6rem;
      }

      .cv-contact {
        gap: 10px;
        font-size: 0.75rem;
      }

      .generate-bar {
        flex-direction: column;
      }

      .generate-bar .btn-accent {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">CV<span>forge</span></div>
    <div style="display:flex;align-items:center;gap:20px;">
      <div class="layout-picker">
        <span style="font-size:0.75rem;color:var(--muted);margin-right:2px;">Mise en page :</span>
        <button class="layout-btn active" data-layout="standard" onclick="setLayout('standard')" title="Standard"><i
            class='bx bx-layout'></i> Standard</button>
        <button class="layout-btn" data-layout="sidebar" onclick="setLayout('sidebar')" title="Sidebar"><i
            class='bx bx-columns'></i> Sidebar</button>
        <button class="layout-btn" data-layout="centered" onclick="setLayout('centered')" title="Centré"><i
            class='bx bx-align-middle'></i> Centré</button>
      </div>
      <div class="theme-switcher">
        <span style="font-size:0.75rem;color:var(--muted);margin-right:4px;">Thème :</span>
        <button class="theme-btn active" data-theme="dark" title="Sombre & Élégant"></button>
        <button class="theme-btn" data-theme="minimal" title="Moderne & Minimaliste"></button>
        <button class="theme-btn" data-theme="creative" title="Créatif & Coloré"></button>
        <button class="theme-btn" data-theme="classic" title="Professionnel & Classique"></button>
      </div>
    </div>
  </header>

  <div class="api-bar">
    <label>OPENROUTER API KEY</label>
    <input type="password" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off">
    <div class="model-tag"><i class='bx bx-bolt-circle' style="vertical-align:middle"></i> moonshotai/kimi-k2</div>
  </div>

  <div class="mobile-tabs">
    <button class="mobile-tab active" id="tab-editor" onclick="switchTab('editor')"><i class='bx bx-edit'></i>
      Éditeur</button>
    <button class="mobile-tab" id="tab-preview" onclick="switchTab('preview')"><i class='bx bx-show'></i>
      Aperçu</button>
  </div>

  <div id="appWrapper" style="display:flex;flex-direction:column;height:calc(100vh - 120px);">
    <div class="app-layout">
      <!-- a: e -->
      <div class="editor-col tab-active"
        style="display:flex;flex-direction:column;border-right:1px solid var(--border);">
        <div class="editor-panel" id="editorPanel">

          <!-- A -->
          <div class="section-card open" id="card-about">
            <div class="section-header" onclick="toggleCard('about')">
              <div class="section-title"><i class='bx bx-user section-icon'></i> À Propos</div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-body">
              <div class="field-row">
                <div class="field-group">
                  <label>Prénom</label>
                  <input type="text" id="firstName" placeholder="Marie" oninput="updatePreview()">
                </div>
                <div class="field-group">
                  <label>Nom</label>
                  <input type="text" id="lastName" placeholder="Dupont" oninput="updatePreview()">
                </div>
              </div>
              <div class="field-group">
                <label>Titre / Poste</label>
                <input type="text" id="jobTitle" placeholder="Designer UX & Développeuse créative"
                  oninput="updatePreview()">
              </div>
              <div class="field-row">
                <div class="field-group">
                  <label>Email</label>
                  <input type="email" id="email" placeholder="marie@exemple.com" oninput="updatePreview()">
                </div>
                <div class="field-group">
                  <label>Téléphone</label>
                  <input type="text" id="phone" placeholder="+33 6 00 00 00 00" oninput="updatePreview()">
                </div>
              </div>
              <div class="field-row">
                <div class="field-group">
                  <label>Ville</label>
                  <input type="text" id="city" placeholder="Paris, France" oninput="updatePreview()">
                </div>
                <div class="field-group">
                  <label>Site / Portfolio</label>
                  <input type="text" id="website" placeholder="marie.design" oninput="updatePreview()">
                </div>
              </div>
              <div class="field-group">
                <label><i class='bx bx-image-alt' style="vertical-align:middle;margin-right:4px;"></i>Photo (URL
                  hébergée)</label>
                <input type="url" id="photoUrl" placeholder="https://exemple.com/ma-photo.jpg"
                  oninput="updatePreview()">
              </div>
              <div class="field-group">
                <label>Résumé personnel</label>
                <textarea id="about" rows="3" placeholder="Décrivez-vous en quelques phrases..."
                  oninput="updatePreview()"></textarea>
              </div>
              <div class="section-actions">
                <span></span>
                <button class="btn btn-ai" onclick="aiGenerate('about')"><i class='bx bx-magic-wand'></i> Générer avec
                  Kimi</button>
              </div>
            </div>
          </div>

          <!-- EXPERIENCE -->
          <div class="section-card" id="card-experience">
            <div class="section-header" onclick="toggleCard('experience')">
              <div class="section-title"><i class='bx bx-briefcase section-icon'></i> Expérience</div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-body">
              <div class="items-list" id="expList"></div>
              <div class="section-actions">
                <button class="btn btn-ghost" onclick="addItem('experience')">+ Ajouter</button>
                <button class="btn btn-ai" onclick="aiGenerate('experience')"><i class='bx bx-magic-wand'></i> Améliorer
                  avec Kimi</button>
              </div>
            </div>
          </div>

          <!-- FORMATION -->
          <div class="section-card" id="card-education">
            <div class="section-header" onclick="toggleCard('education')">
              <div class="section-title"><i class='bx bx-graduation section-icon'></i> Formation</div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-body">
              <div class="items-list" id="eduList"></div>
              <div class="section-actions">
                <button class="btn btn-ghost" onclick="addItem('education')">+ Ajouter</button>
                <button class="btn btn-ai" onclick="aiGenerate('education')"><i class='bx bx-magic-wand'></i> Améliorer
                  avec Kimi</button>
              </div>
            </div>
          </div>

          <!-- COMPÉTENCES -->
          <div class="section-card" id="card-skills">
            <div class="section-header" onclick="toggleCard('skills')">
              <div class="section-title"><i class='bx bx-code-alt section-icon'></i> Compétences</div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-body">
              <div class="field-group">
                <label>Ajouter une compétence</label>
                <div class="skills-input-wrap">
                  <input type="text" id="skillInput" placeholder="ex: React, Figma, Python..."
                    onkeydown="if(event.key==='Enter')addSkill()">
                  <button class="btn btn-ghost" onclick="addSkill()" style="white-space:nowrap">+ Add</button>
                </div>
              </div>
              <div class="tags-container" id="skillsTags"></div>
              <div class="section-actions" style="padding-top:8px;">
                <span></span>
                <button class="btn btn-ai" onclick="aiGenerate('skills')"><i class='bx bx-magic-wand'></i> Suggérer avec
                  Kimi</button>
              </div>
            </div>
          </div>

          <!-- PROJETS -->
          <div class="section-card" id="card-projects">
            <div class="section-header" onclick="toggleCard('projects')">
              <div class="section-title"><i class='bx bx-rocket section-icon'></i> Projets</div>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-body">
              <div class="items-list" id="projList"></div>
              <div class="section-actions">
                <button class="btn btn-ghost" onclick="addItem('projects')">+ Ajouter</button>
                <button class="btn btn-ai" onclick="aiGenerate('projects')"><i class='bx bx-magic-wand'></i> Améliorer
                  avec Kimi</button>
              </div>
            </div>
          </div>

        </div>

        <!-- GENERATE BAR -->
        <div class="generate-bar">
          <div class="export-menu">
            <button class="btn btn-accent export-trigger" type="button" onclick="toggleExportMenu(this)">
              <i class='bx bx-download'></i> Exporter
            </button>
            <div class="export-menu-list">
              <button class="export-option" type="button" onclick="exportCV('html')">HTML</button>
              <button class="export-option" type="button" onclick="exportCV('pdf')">PDF A4</button>
              <button class="export-option" type="button" onclick="exportCV('png')">PNG HD</button>
              <button class="export-option" type="button" onclick="exportCV('svg')">SVG</button>
            </div>
          </div>
          <button class="btn btn-ai" style="padding:12px 18px;" onclick="aiGenerateAll()"><i
              class='bx bx-magic-wand'></i> Tout générer avec Kimi</button>
        </div>
      </div>

      <!-- RIGHT: PREVIEW -->
      <div class="preview-panel">
        <div class="preview-toolbar">
          <span>Aperçu en temps réel</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <span id="aiStatus"></span>
            <div class="export-menu">
              <button class="btn btn-ghost export-trigger" type="button" onclick="toggleExportMenu(this)">
                <i class='bx bx-download'></i> Export
              </button>
              <div class="export-menu-list">
                <button class="export-option" type="button" onclick="exportCV('html')">HTML</button>
                <button class="export-option" type="button" onclick="exportCV('pdf')">PDF A4</button>
                <button class="export-option" type="button" onclick="exportCV('png')">PNG HD</button>
                <button class="export-option" type="button" onclick="exportCV('svg')">SVG</button>
              </div>
            </div>
          </div>
        </div>
        <div id="cvPreview">
          <div class="empty-state">
            <div class="big-icon"><i class='bx bx-file-blank' style="font-size:3rem;opacity:0.4;"></i></div>
            <h3>Votre CV apparaîtra ici</h3>
            <p>Remplissez les champs à gauche pour voir l'aperçu en direct</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // STATE
    const state = {
      experience: [],
      education: [],
      projects: [],
      skills: []
    };

    // THEME
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const t = btn.dataset.theme;
        document.body.className = t === 'dark' ? '' : `theme-${t}`;
      });
    });

    // LAYOUT
    let currentLayout = 'standard';
    function setLayout(layout) {
      currentLayout = layout;
      document.querySelectorAll('.layout-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.layout === layout);
      });
      updatePreview();
    }

    // TOGGLE CARD
    function toggleCard(id) {
      const card = document.getElementById(`card-${id}`);
      card.classList.toggle('open');
    }

    // TOAST
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    let exportInProgress = false;

    function closeExportMenus() {
      document.querySelectorAll('.export-menu').forEach(menu => menu.classList.remove('open'));
    }

    function toggleExportMenu(button) {
      const menu = button.closest('.export-menu');
      const willOpen = !menu.classList.contains('open');
      closeExportMenus();
      if (willOpen) menu.classList.add('open');
    }

    function setExportState(isLoading) {
      exportInProgress = isLoading;
      document.querySelectorAll('.export-trigger, .export-option').forEach(el => {
        el.disabled = isLoading;
      });
    }

    document.addEventListener('click', event => {
      if (!event.target.closest('.export-menu')) closeExportMenus();
    });

    // ADD ITEM
    function addItem(type) {
      const id = Date.now();
      if (type === 'experience') {
        state.experience.push({ id, title: '', company: '', date: '', desc: '' });
      } else if (type === 'education') {
        state.education.push({ id, degree: '', school: '', date: '', desc: '' });
      } else if (type === 'projects') {
        state.projects.push({ id, name: '', desc: '', link: '' });
      }
      renderLists();
      updatePreview();
    }

    function removeItem(type, id) {
      state[type] = state[type].filter(i => i.id !== id);
      renderLists();
      updatePreview();
    }

    function renderLists() {
      // Experience
      const expEl = document.getElementById('expList');
      expEl.innerHTML = state.experience.map(item => `
    <div class="item-card">
      <button class="remove-item" onclick="removeItem('experience',${item.id})">✕</button>
      <div class="field-row">
        <div class="field-group">
          <label>Poste</label>
          <input type="text" value="${item.title}" placeholder="Développeur Front-End" oninput="updateItem('experience',${item.id},'title',this.value)">
        </div>
        <div class="field-group">
          <label>Entreprise</label>
          <input type="text" value="${item.company}" placeholder="Google" oninput="updateItem('experience',${item.id},'company',this.value)">
        </div>
      </div>
      <div class="field-group">
        <label>Période</label>
        <input type="text" value="${item.date}" placeholder="Jan 2022 — Présent" oninput="updateItem('experience',${item.id},'date',this.value)">
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea rows="2" placeholder="Décrivez vos responsabilités..." oninput="updateItem('experience',${item.id},'desc',this.value)">${item.desc}</textarea>
      </div>
    </div>
  `).join('');

      // Education
      const eduEl = document.getElementById('eduList');
      eduEl.innerHTML = state.education.map(item => `
    <div class="item-card">
      <button class="remove-item" onclick="removeItem('education',${item.id})">✕</button>
      <div class="field-row">
        <div class="field-group">
          <label>Diplôme</label>
          <input type="text" value="${item.degree}" placeholder="Master Design" oninput="updateItem('education',${item.id},'degree',this.value)">
        </div>
        <div class="field-group">
          <label>École</label>
          <input type="text" value="${item.school}" placeholder="Sciences Po" oninput="updateItem('education',${item.id},'school',this.value)">
        </div>
      </div>
      <div class="field-group">
        <label>Période</label>
        <input type="text" value="${item.date}" placeholder="2018 — 2020" oninput="updateItem('education',${item.id},'date',this.value)">
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea rows="2" placeholder="Spécialisation, mentions..." oninput="updateItem('education',${item.id},'desc',this.value)">${item.desc}</textarea>
      </div>
    </div>
  `).join('');

      // Projects
      const projEl = document.getElementById('projList');
      projEl.innerHTML = state.projects.map(item => `
    <div class="item-card">
      <button class="remove-item" onclick="removeItem('projects',${item.id})">✕</button>
      <div class="field-group">
        <label>Nom du projet</label>
        <input type="text" value="${item.name}" placeholder="App mobile XYZ" oninput="updateItem('projects',${item.id},'name',this.value)">
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea rows="2" placeholder="Décrivez le projet, technologies utilisées..." oninput="updateItem('projects',${item.id},'desc',this.value)">${item.desc}</textarea>
      </div>
      <div class="field-group">
        <label>Lien</label>
        <input type="text" value="${item.link}" placeholder="github.com/vous/projet" oninput="updateItem('projects',${item.id},'link',this.value)">
      </div>
    </div>
  `).join('');
    }

    function updateItem(type, id, field, value) {
      const item = state[type].find(i => i.id === id);
      if (item) item[field] = value;
      updatePreview();
    }

    // SKILLS
    function addSkill() {
      const inp = document.getElementById('skillInput');
      const val = inp.value.trim();
      if (!val) return;
      val.split(',').forEach(s => {
        const sk = s.trim();
        if (sk && !state.skills.includes(sk)) state.skills.push(sk);
      });
      inp.value = '';
      renderSkills();
      updatePreview();
    }

    function removeSkill(skill) {
      state.skills = state.skills.filter(s => s !== skill);
      renderSkills();
      updatePreview();
    }

    function renderSkills() {
      document.getElementById('skillsTags').innerHTML = state.skills.map(s => `
    <div class="tag">${s}<span class="tag-remove" onclick="removeSkill('${s}')">✕</span></div>
  `).join('');
    }

    // PREVIEW
    function getData() {
      return {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        jobTitle: document.getElementById('jobTitle').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        website: document.getElementById('website').value,
        about: document.getElementById('about').value,
        photoUrl: document.getElementById('photoUrl').value,
      };
    }

    function renderCvIcon(name) {
      const icons = {
        envelope: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v10H4z"/><path d="m4 8 8 6 8-6"/></svg>`,

        map: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-6-5.33-6-11a6 6 0 1 1 12 0c0 5.67-6 11-6 11z"/><circle cx="12" cy="10" r="2.5"/></svg>`,
        link: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 1 0-7.07-7.07L11 4"/><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 19"/></svg>`,

      };

      return `<span class="cv-inline-icon">${icons[name] || ''}</span>`;
    }

    function updatePreview() {
      const d = getData();
      const hasContent = d.firstName || d.lastName || d.about || state.experience.length || state.education.length || state.skills.length || state.projects.length;

      if (!hasContent) {
        document.getElementById('cvPreview').innerHTML = `
      <div class="empty-state">

        <h3>Votre CV apparaîtra ici</h3>

      const contactItems = `
    ${d.email ? `<span>${renderCvIcon('envelope')} ${d.email}</span>` : ''}
    ${d.phone ? `<span>${renderCvIcon('phone')} ${d.phone}</span>` : ''}
    ${d.city ? `<span>${renderCvIcon('map')} ${d.city}</span>` : ''}
    ${d.website ? `<span>${renderCvIcon('link')} ${d.website}</span>` : ''}
  `;

      const sectionsHTML = () => {
        let s = '';
        if (d.about) s += `<div class="cv-section"><div class="cv-section-title">À Propos</div><div class="cv-about">${d.about}</div></div>`;
        if (state.experience.length) {

          state.experience.forEach(e => {
            if (e.title || e.company) s += `<div class="cv-item"><div class="cv-item-header"><div><div class="cv-item-title">${e.title}</div><div class="cv-item-org">${e.company}</div></div><div class="cv-item-date">${e.date}</div></div>${e.desc ? `<div class="cv-item-desc">${e.desc}</div>` : ''}</div>`;
          });
          s += `</div>`;
        }
        if (state.education.length) {
          s += `<div class="cv-section"><div class="cv-section-title">Formation</div>`;
          state.education.forEach(e => {
            if (e.degree || e.school) s += `<div class="cv-item"><div class="cv-item-header"><div><div class="cv-item-title">${e.degree}</div><div class="cv-item-org">${e.school}</div></div><div class="cv-item-date">${e.date}</div></div>${e.desc ? `<div class="cv-item-desc">${e.desc}</div>` : ''}</div>`;
          });
          s += `</div>`;
        }
        if (state.skills.length) {
          s += `<div class="cv-section"><div class="cv-section-title">Compétences</div><div class="skills-grid">${state.skills.map(sk => `<div class="skill-pill">${sk}</div>`).join('')}</div></div>`;
        }
        if (state.projects.length) {
          s += `<div class="cv-section"><div class="cv-section-title">Projets</div><div class="projects-grid">`;
          state.projects.forEach(p => {
            if (p.name || p.desc) s += `<div class="project-card-preview"><div class="project-card-title">${p.name}</div><div class="project-card-desc">${p.desc}</div>${p.link ? `<a class="project-card-link" href="${p.link}" target="_blank" rel="noopener noreferrer">${renderCvIcon('external')} ${p.link}</a>` : ''}</div>`;
          });
          s += `</div></div>`;
        }
        return s;
      };

      let html = `<div class="cv-preview">`;

      if (currentLayout === 'sidebar') {
        // SIDEBAR LAYOUT
        const sidebarSections = `
      ${d.about ? `<div class="cv-sidebar-section-title">À Propos</div><div style="font-size:0.78rem;line-height:1.6;color:var(--text);opacity:0.8;">${d.about}</div>` : ''}
      ${state.skills.length ? `<div class="cv-sidebar-section-title">Compétences</div><div style="display:flex;flex-direction:column;gap:5px;">${state.skills.map(sk => `<div style="font-size:0.78rem;padding:3px 0;border-bottom:1px solid var(--border);">${sk}</div>`).join('')}</div>` : ''}
    `;
        const mainSections = () => {
          let s = '';
          if (state.experience.length) {
            s += `<div class="cv-section"><div class="cv-section-title">Expérience</div>`;
            state.experience.forEach(e => { if (e.title || e.company) s += `<div class="cv-item"><div class="cv-item-header"><div><div class="cv-item-title">${e.title}</div><div class="cv-item-org">${e.company}</div></div><div class="cv-item-date">${e.date}</div></div>${e.desc ? `<div class="cv-item-desc">${e.desc}</div>` : ''}</div>`; });
            s += `</div>`;
          }
          if (state.education.length) {
            s += `<div class="cv-section"><div class="cv-section-title">Formation</div>`;
            state.education.forEach(e => { if (e.degree || e.school) s += `<div class="cv-item"><div class="cv-item-header"><div><div class="cv-item-title">${e.degree}</div><div class="cv-item-org">${e.school}</div></div><div class="cv-item-date">${e.date}</div></div>${e.desc ? `<div class="cv-item-desc">${e.desc}</div>` : ''}</div>`; });
            s += `</div>`;
          }
          if (state.projects.length) {
            s += `<div class="cv-section"><div class="cv-section-title">Projets</div>`;
            state.projects.forEach(p => { if (p.name || p.desc) s += `<div class="cv-item"><div class="cv-item-title">${p.name}</div><div class="cv-item-desc">${p.desc}</div>${p.link ? `<a class="project-card-link" href="${p.link}" target="_blank" rel="noopener noreferrer">${renderCvIcon('external')} ${p.link}</a>` : ''}</div>`; });
            s += `</div>`;
          }
          return s;
        };
        html += `<div class="cv-layout-sidebar">
      <div class="cv-sidebar-col">
        ${d.photoUrl ? `<img src="${d.photoUrl}" class="cv-sidebar-photo" alt="Photo" onerror="this.style.display='none'">` : ''}
        <div class="cv-sidebar-name">${d.firstName} ${d.lastName}</div>
        <div class="cv-sidebar-title">${d.jobTitle}</div>
        <div class="cv-sidebar-contact">${contactItems}</div>
        ${sidebarSections}
      </div>
      <div>${mainSections()}</div>
    </div>`;

      } else if (currentLayout === 'centered') {
        // CENTERED LAYOUT
        html += `<div style="text-align:center;border-bottom:2px solid var(--accent);padding-bottom:28px;margin-bottom:32px;">
      ${d.photoUrl ? `<img src="${d.photoUrl}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);margin-bottom:14px;display:block;margin-left:auto;margin-right:auto;" alt="Photo" onerror="this.style.display='none'">` : ''}
      <div class="cv-name" style="text-align:center;">${d.firstName} ${d.lastName}</div>
      ${d.jobTitle ? `<div class="cv-title" style="text-align:center;">${d.jobTitle}</div>` : ''}
      <div class="cv-contact" style="justify-content:center;">${contactItems}</div>
    </div>
    ${sectionsHTML()}`;

      } else {
        // STANDARD LAYOUT (default)
        html += `<div class="cv-header-section cv-header-classic">
      <div class="cv-header-text">
        <div class="cv-name">${d.firstName} ${d.lastName}</div>
        ${d.jobTitle ? `<div class="cv-title">${d.jobTitle}</div>` : ''}
        <div class="cv-contact">${contactItems}</div>
      </div>
      ${d.photoUrl ? `<img src="${d.photoUrl}" class="cv-photo" style="margin-left:24px;" alt="Photo" onerror="this.style.display='none'">` : ''}
    </div>
    ${sectionsHTML()}`;
      }

      html += `</div>`;
      document.getElementById('cvPreview').innerHTML = html;
    }

    // EXPORT
    const EXPORT_SHEET_WIDTH = 794;
    const EXPORT_SHEET_MIN_HEIGHT = 1123;

    function sanitizeFilename(value) {
      return value
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'mon-cv';
    }

    function getExportFilenameBase() {
      const d = getData();
      const fullName = `${d.firstName} ${d.lastName}`.trim();
      return sanitizeFilename(fullName ? `cv-${fullName}` : 'mon-cv');
    }

    function getThemeClass() {
      return document.body.className.trim();
    }

    function getPreviewNode() {
      return document.querySelector('#cvPreview .cv-preview');
    }

    function getPreviewMarkup() {
      const previewNode = getPreviewNode();
      if (!previewNode) {
        throw new Error('Remplissez d’abord le CV avant de l’exporter');
      }
      return previewNode.outerHTML;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function getExportDocumentHtml(previewMarkup) {
      const style = document.querySelector('style').innerHTML;
      const themeClass = getThemeClass();
      return `<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>${style}</style>
</head>
<body>
  <div class="export-document${themeClass ? ` ${themeClass}` : ''}">
    <div class="export-sheet">${previewMarkup}</div>
  </div>
</body>
</html>`;
    }

    async function waitForNodeAssets(node) {
      if (document.fonts?.ready) {
        await document.fonts.ready;
      }

      const images = [...node.querySelectorAll('img')];
      await Promise.all(images.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    async function buildExportStage() {
      const themeClass = getThemeClass();
      const previewMarkup = getPreviewMarkup();
      const stage = document.createElement('div');
      stage.className = `export-stage${themeClass ? ` ${themeClass}` : ''}`;
      stage.innerHTML = `<div class="export-sheet">${previewMarkup}</div>`;
      document.body.appendChild(stage);

      const sheet = stage.querySelector('.export-sheet');
      await waitForNodeAssets(sheet);

      return { stage, sheet };
    }

    function cleanupExportStage(stage) {
      if (stage?.parentNode) stage.parentNode.removeChild(stage);
    }

    async function exportHtmlFile(filenameBase) {
      const previewMarkup = getPreviewMarkup();
      const blob = new Blob([getExportDocumentHtml(previewMarkup)], { type: 'text/html;charset=utf-8' });
      downloadBlob(blob, `${filenameBase}.html`);
    }

    async function exportPngFile(sheet, filenameBase) {
      const blob = await window.htmlToImage.toBlob(sheet, {
        pixelRatio: 2,
        cacheBust: true,
        backgroundColor: getComputedStyle(sheet).backgroundColor,
        width: EXPORT_SHEET_WIDTH,
        height: Math.max(sheet.scrollHeight, EXPORT_SHEET_MIN_HEIGHT)
      });

      if (!blob) {
        throw new Error('Impossible de générer le PNG');
      }

      downloadBlob(blob, `${filenameBase}.png`);
    }

    async function exportSvgFile(sheet, filenameBase) {
      const dataUrl = await window.htmlToImage.toSvg(sheet, {
        cacheBust: true,
        backgroundColor: getComputedStyle(sheet).backgroundColor,
        width: EXPORT_SHEET_WIDTH,
        height: Math.max(sheet.scrollHeight, EXPORT_SHEET_MIN_HEIGHT)
      });

      const response = await fetch(dataUrl);
      const blob = await response.blob();
      downloadBlob(blob, `${filenameBase}.svg`);
    }

    async function exportPdfFile(sheet, filenameBase) {
      const canvas = await window.htmlToImage.toCanvas(sheet, {
        pixelRatio: 2,
        cacheBust: true,
        backgroundColor: getComputedStyle(sheet).backgroundColor,
        width: EXPORT_SHEET_WIDTH,
        height: Math.max(sheet.scrollHeight, EXPORT_SHEET_MIN_HEIGHT)
      });

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4',
        compress: true
      });

      const pageWidth = 210;
      const pageHeight = 297;
      const pxPerMm = canvas.width / pageWidth;
      const pageHeightPx = Math.floor(pageHeight * pxPerMm);

      let offsetY = 0;
      let pageIndex = 0;

      while (offsetY < canvas.height) {
        const sliceHeight = Math.min(pageHeightPx, canvas.height - offsetY);
        const pageCanvas = document.createElement('canvas');
        pageCanvas.width = canvas.width;
        pageCanvas.height = sliceHeight;

        const ctx = pageCanvas.getContext('2d');
        ctx.fillStyle = getComputedStyle(sheet).backgroundColor;
        ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
        ctx.drawImage(
          canvas,
          0,
          offsetY,
          canvas.width,
          sliceHeight,
          0,
          0,
          canvas.width,
          sliceHeight
        );

        if (pageIndex > 0) {
          pdf.addPage('a4', 'portrait');
        }

        const renderedHeightMm = sliceHeight / pxPerMm;
        pdf.addImage(pageCanvas.toDataURL('image/png'), 'PNG', 0, 0, pageWidth, renderedHeightMm, undefined, 'FAST');

        offsetY += sliceHeight;
        pageIndex += 1;
      }

      pdf.save(`${filenameBase}.pdf`);
    }

    async function exportCV(format = 'html') {
      if (exportInProgress) return;

      closeExportMenus();
      setExportState(true);

      let stage = null;

      try {
        const filenameBase = getExportFilenameBase();

        if (format === 'html') {
          await exportHtmlFile(filenameBase);
        } else {
          if (!window.htmlToImage) {
            throw new Error('La librairie d’export image n’est pas chargée');
          }

          if (format === 'pdf' && !window.jspdf?.jsPDF) {
            throw new Error('La librairie PDF n’est pas chargée');
          }

          ({ stage } = await buildExportStage());
          const sheet = stage.querySelector('.export-sheet');

          if (format === 'pdf') {
            await exportPdfFile(sheet, filenameBase);
          } else if (format === 'png') {
            await exportPngFile(sheet, filenameBase);
          } else if (format === 'svg') {
            await exportSvgFile(sheet, filenameBase);
          } else {
            throw new Error('Format d’export non pris en charge');
          }
        }

        showToast(`✓ Export ${format.toUpperCase()} terminé !`, 'success');
      } catch (error) {
        showToast(`❌ ${error.message}`, 'error');
      } finally {
        cleanupExportStage(stage);
        setExportState(false);
      }
    }

    // AI - KIMI via OpenRouter
    async function callKimi(prompt) {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        showToast('⚠ Entrez votre clé OpenRouter d\'abord', 'error');
        return null;
      }

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': 'https://cvforge.app',
          'X-Title': 'CVForge'
        },
        body: JSON.stringify({
          model: 'moonshotai/kimi-k2',
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 800
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'Erreur API');
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    function setAiStatus(loading) {
      document.getElementById('aiStatus').innerHTML = loading
        ? `<span class="ai-loading">Kimi génère <span class="dot-pulse"><span></span><span></span><span></span></span></span>`
        : '';
    }

    async function aiGenerate(section) {
      const d = getData();
      const name = `${d.firstName} ${d.lastName}`.trim() || 'cette personne';

      setAiStatus(true);

      try {
        let prompt = '';
        let result = '';

        if (section === 'about') {
          const current = d.about;
          prompt = `Tu es un expert en rédaction de CV. Rédige un résumé personnel percutant et professionnel en français pour ${name}, ${d.jobTitle || 'professionnel(le)'}. ${current ? `Améliore ce texte existant: "${current}"` : 'Crée un résumé attrayant de 3-4 phrases.'} Réponds UNIQUEMENT avec le texte du résumé, sans explication.`;
          result = await callKimi(prompt);
          if (result) {
            document.getElementById('about').value = result.trim();
            updatePreview();
            showToast('✓ Résumé généré par Kimi !', 'success');
          }
        }

        else if (section === 'experience') {
          if (!state.experience.length) {
            showToast('Ajoutez d\'abord des expériences à améliorer', '');
            setAiStatus(false);
            return;
          }
          prompt = `Tu es un expert en rédaction de CV. Améliore ces descriptions d'expériences professionnelles pour ${name} (${d.jobTitle || 'professionnel(le)'}). Pour chaque expérience, rends la description plus impactante avec des verbes d'action et des résultats concrets. Réponds en JSON: [{"id": ..., "desc": "..."}]. Expériences: ${JSON.stringify(state.experience.map(e => ({ id: e.id, title: e.title, company: e.company, desc: e.desc })))}. UNIQUEMENT le JSON, rien d'autre.`;
          result = await callKimi(prompt);
          if (result) {
            try {
              const clean = result.replace(/```json|```/g, '').trim();
              const improved = JSON.parse(clean);
              improved.forEach(item => {
                const exp = state.experience.find(e => e.id === item.id);
                if (exp) exp.desc = item.desc;
              });
              renderLists();
              updatePreview();
              showToast('✓ Expériences améliorées par Kimi !', 'success');
            } catch (e) { showToast('Erreur de parsing JSON', 'error'); }
          }
        }

        else if (section === 'education') {
          if (!state.education.length) {
            showToast('Ajoutez d\'abord des formations à améliorer', '');
            setAiStatus(false);
            return;
          }
          prompt = `Améliore ces descriptions de formations en français pour rendre le CV plus attractif. Réponds en JSON: [{"id": ..., "desc": "..."}]. Formations: ${JSON.stringify(state.education.map(e => ({ id: e.id, degree: e.degree, school: e.school, desc: e.desc })))}. UNIQUEMENT le JSON.`;
          result = await callKimi(prompt);
          if (result) {
            try {
              const clean = result.replace(/```json|```/g, '').trim();
              const improved = JSON.parse(clean);
              improved.forEach(item => {
                const edu = state.education.find(e => e.id === item.id);
                if (edu) edu.desc = item.desc;
              });
              renderLists();
              updatePreview();
              showToast('✓ Formations améliorées par Kimi !', 'success');
            } catch (e) { showToast('Erreur de parsing JSON', 'error'); }
          }
        }

        else if (section === 'skills') {
          prompt = `Suggère 10 compétences techniques et soft skills pertinentes pour un profil de ${d.jobTitle || 'développeur/designer'} en 2025. Tiens compte des compétences actuelles: ${state.skills.join(', ') || 'aucune'}. Réponds UNIQUEMENT avec une liste JSON: ["Compétence1", "Compétence2", ...]. Rien d'autre.`;
          result = await callKimi(prompt);
          if (result) {
            try {
              const clean = result.replace(/```json|```/g, '').trim();
              const suggested = JSON.parse(clean);
              suggested.forEach(s => { if (!state.skills.includes(s)) state.skills.push(s); });
              renderSkills();
              updatePreview();
              showToast('✓ Compétences suggérées par Kimi !', 'success');
            } catch (e) { showToast('Erreur de parsing JSON', 'error'); }
          }
        }

        else if (section === 'projects') {
          if (!state.projects.length) {
            showToast('Ajoutez d\'abord des projets à améliorer', '');
            setAiStatus(false);
            return;
          }
          prompt = `Améliore ces descriptions de projets pour les rendre plus attractives et professionnelles. Mets en avant la valeur ajoutée et les technologies. Réponds en JSON: [{"id": ..., "desc": "..."}]. Projets: ${JSON.stringify(state.projects.map(p => ({ id: p.id, name: p.name, desc: p.desc })))}. UNIQUEMENT le JSON.`;
          result = await callKimi(prompt);
          if (result) {
            try {
              const clean = result.replace(/```json|```/g, '').trim();
              const improved = JSON.parse(clean);
              improved.forEach(item => {
                const proj = state.projects.find(p => p.id === item.id);
                if (proj) proj.desc = item.desc;
              });
              renderLists();
              updatePreview();
              showToast('✓ Projets améliorés par Kimi !', 'success');
            } catch (e) { showToast('Erreur de parsing JSON', 'error'); }
          }
        }

      } catch (err) {
        showToast(`❌ Erreur: ${err.message}`, 'error');
      } finally {
        setAiStatus(false);
      }
    }

    async function aiGenerateAll() {
      const d = getData();
      if (!d.firstName && !d.jobTitle) {
        showToast('Entrez au moins un nom et un titre', '');
        return;
      }
      setAiStatus(true);
      try {
        await aiGenerate('about');
        if (state.experience.length) await aiGenerate('experience');
        if (state.education.length) await aiGenerate('education');
        await aiGenerate('skills');
        if (state.projects.length) await aiGenerate('projects');
        showToast('✓ Tout le CV a été optimisé par Kimi !', 'success');
      } catch (e) {
        showToast(`❌ ${e.message}`, 'error');
      } finally {
        setAiStatus(false);
      }
    }

    // MOBILE TAB SWITCH
    function switchTab(tab) {
      const editorCol = document.querySelector('.editor-col');
      const previewPanel = document.querySelector('.preview-panel');
      const tabEditor = document.getElementById('tab-editor');
      const tabPreview = document.getElementById('tab-preview');
      if (tab === 'editor') {
        editorCol.classList.add('tab-active');
        previewPanel.classList.remove('tab-active');
        tabEditor.classList.add('active');
        tabPreview.classList.remove('active');
      } else {
        editorCol.classList.remove('tab-active');
        previewPanel.classList.add('tab-active');
        tabEditor.classList.remove('active');
        tabPreview.classList.add('active');
      }
    }

    // INIT
    renderLists();
  </script>
